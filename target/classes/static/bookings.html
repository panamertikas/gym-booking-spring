<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBooking - Bookings</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        nav { background-color: #333; padding: 15px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-size: 16px; }
        nav a:hover { color: #ffcc00; }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #333; color: white; }
        button { padding: 8px 15px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #ffcc00; color: #333; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Members</a>
    <a href="gymclasses.html">Gym Classes</a>
    <a href="bookings.html">Bookings</a>
    <a href="register-member.html">Register Member</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">
    <h1>Bookings</h1>
    <table id="bookingsTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Member</th>
            <th>Gym Class</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="bookingsBody"></tbody>
    </table>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    document.querySelector('nav').innerHTML += '<a href="#" onclick="logout()">Logout</a>';

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    async function loadBookings() {
        const response = await fetch('http://localhost:8080/api/bookings', {
            headers: {'Authorization': 'Bearer ' + token}
        });
        const bookings = await response.json();
        const tbody = document.getElementById('bookingsBody');
        tbody.innerHTML = '';
        bookings.forEach(booking => {
            tbody.innerHTML += `
                <tr>
                    <td>${booking.id}</td>
                    <td>${booking.date}</td>
                    <td>${booking.time}</td>
                    <td>${booking.member.firstname} ${booking.member.lastname}</td>
                    <td>${booking.gymClass.className} - ${booking.gymClass.trainer}</td>
                    <td><button onclick="deleteBooking(${booking.id})">Delete</button></td>
                </tr>
            `;
        });
    }

    async function deleteBooking(id) {
        const response = await fetch(`http://localhost:8080/api/bookings/${id}`, {
            method: 'DELETE',
            headers: {'Authorization': 'Bearer ' + token}
        });
        if (!response.ok) {
            const message = await response.text();
            alert(message);
        }
        loadBookings();
    }

    loadBookings();
</script>
</body>
</html>

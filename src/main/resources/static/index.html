<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBooking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        nav {
            background-color: #333;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 16px;
        }
        nav a:hover {
            color: #ffcc00;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #333;
            color: white;
        }
        button {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ffcc00;
            color: #333;
        }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Members</a>
    <a href="gymclasses.html">Gym Classes</a>
    <a href="bookings.html">Bookings</a>
    <a href="register-member.html">Register Member</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">
    <h1>Members</h1>
    <button onclick="loadMembers()">Load Members</button>
    <table id="membersTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Email</th>
            <th>Membership</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="membersBody">
        </tbody>
    </table>
</div>

<script>

    // Check if token exists
const token = localStorage.getItem('token');
if (!token) {
    window.location.href = 'login.html';
}

// Add logout button to nav
document.querySelector('nav').innerHTML += '<a href="#" onclick="logout()">Logout</a>';

function logout() {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
}

    async function loadMembers() {
    const response = await fetch('http://localhost:8080/api/members', {
        headers: {'Authorization': 'Bearer ' + token}
    });
        const members = await response.json();
        const tbody = document.getElementById('membersBody');
        tbody.innerHTML = '';
        members.forEach(member => {
            tbody.innerHTML += `
                <tr>
                    <td>${member.id}</td>
                    <td>${member.firstname}</td>
                    <td>${member.lastname}</td>
                    <td>${member.mail}</td>
                    <td>${member.membershipType || 'N/A'}</td>
                    <td><button onclick="deleteMember(${member.id})">Delete</button></td>
                </tr>
            `;
        });
    }

   async function deleteMember(id) {
    const response = await fetch(`http://localhost:8080/api/members/${id}`, {
        method: 'DELETE',
        headers: {'Authorization': 'Bearer ' + token}
    });
    if (!response.ok) {
        const message = await response.text();
        alert(message);
    }
    loadMembers();
}
</script>
</body>
</html>

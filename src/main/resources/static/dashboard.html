<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBooking - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        nav { background-color: #333; padding: 15px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-size: 16px; }
        nav a:hover { color: #ffcc00; }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .class-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
        .class-card:hover { background-color: #f5f5f5; border-color: #333; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .available { background-color: #28a745; color: white; }
        .full { background-color: #dc3545; color: white; }
        #calendar-section { display: none; margin-top: 20px; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        #time-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1000; min-width: 300px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
<nav>
    <a href="dashboard.html">My Dashboard</a>
    <a href="my-bookings.html">My Bookings</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">
    <h1>Available Classes</h1>
    <div id="classes-list"></div>

    <div id="calendar-section">
        <h2 id="selected-class-title"></h2>
        <p>Κλικ σε ημερομηνία για κράτηση</p>
        <div id="calendar"></div>
    </div>

    <div id="message"></div>
</div>

<div id="overlay" onclick="closeModal()"></div>
<div id="time-modal">
    <h3 id="modal-title"></h3>
    <p id="modal-date"></p>
    <select id="time-select">
        <option value="08:00">08:00</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00">20:00</option>
    </select>
    <button onclick="confirmBooking()">Book</button>
    <button onclick="closeModal()" style="background:#dc3545; margin-left:10px">Cancel</button>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    let selectedClass = null;
    let calendar = null;
    let selectedDate = null;

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    async function loadClasses() {
        const response = await fetch('http://localhost:8080/api/gym_classes', {
            headers: {'Authorization': 'Bearer ' + token}
        });
        const classes = await response.json();
        const list = document.getElementById('classes-list');
        list.innerHTML = '';
        classes.forEach(gymClass => {
            const isFull = gymClass.currentCapacity >= gymClass.maxCapacity;
            list.innerHTML += `
                <div class="class-card" onclick="selectClass(${gymClass.id}, '${gymClass.className}', ${gymClass.maxCapacity})">
                    <strong>${gymClass.className}</strong> — ${gymClass.trainer}
                    <span class="badge ${isFull ? 'full' : 'available'}" style="float:right">
                        ${gymClass.currentCapacity}/${gymClass.maxCapacity} ${isFull ? 'FULL' : 'Available'}
                    </span>
                </div>
            `;
        });
    }

    async function selectClass(id, name, maxCapacity) {
        selectedClass = { id, name, maxCapacity };
        document.getElementById('selected-class-title').textContent = 'Book: ' + name;
        document.getElementById('calendar-section').style.display = 'block';

        if (calendar) calendar.destroy();

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            validRange: { start: new Date().toISOString().split('T')[0] },
            dateClick: async function(info) {
                const date = info.dateStr;

                const response = await fetch(
                    `http://localhost:8080/api/bookings/availability/${id}/${date}`,
                    { headers: {'Authorization': 'Bearer ' + token} }
                );
                const available = await response.json();

                if (!available) {
                    showMessage('This class is full on ' + date + '!', 'error');
                    return;
                }

                // Άνοιξε modal για επιλογή ώρας
                selectedDate = date;
                document.getElementById('modal-title').textContent = 'Book ' + name;
                document.getElementById('modal-date').textContent = 'Date: ' + date;
                document.getElementById('time-modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        });
        calendar.render();
    }

    function closeModal() {
        document.getElementById('time-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    async function confirmBooking() {
        const time = document.getElementById('time-select').value;
        const memberId = await getMyMemberId();

        if (!memberId) {
            showMessage('Could not find your member profile!', 'error');
            closeModal();
            return;
        }

        const bookResponse = await fetch('http://localhost:8080/api/bookings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                date: selectedDate,
                time: time,
                gymClassId: selectedClass.id,
                memberId: memberId
            })
        });

        closeModal();

        if (bookResponse.ok) {
            showMessage('Booking successful for ' + selectedDate + ' at ' + time + '!', 'success');
            loadClasses();
        } else {
            const msg = await bookResponse.text();
            showMessage(msg, 'error');
        }
    }

    async function getMyMemberId() {
        const response = await fetch('http://localhost:8080/api/members/me', {
            headers: {'Authorization': 'Bearer ' + token}
        });
        if (response.ok) {
            const member = await response.json();
            return member.id;
        }
        return null;
    }

    function showMessage(msg, type) {
        const el = document.getElementById('message');
        el.textContent = msg;
        el.className = type;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    loadClasses();
</script>
</body>
</html>
